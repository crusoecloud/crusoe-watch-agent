.semver-tag-base:
  stage: publish
  image: alpine:3.19
  before_script:
    - apk add --no-cache git

semver-tag:config-reloader:
  extends: .semver-tag-base
  script:
    - |
      VERSION_FILE="k8s/vector-config-reloader/VERSION"

      if git diff --name-only HEAD~1 HEAD | grep -q "^${VERSION_FILE}"; then
        VERSION=$(tr -d ' \n' < ${VERSION_FILE})
        TAG="v${VERSION}"

        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists. Skipping."
        else
          git config user.name "gitlab-ci"
          git config user.email "gitlab-ci@crusoe.ai"
          git tag "$TAG"
          git push "https://ci-push-token:${REPO_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$TAG"
        fi
      else
        echo "VERSION file not changed. Skipping."
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

semver-tag:vm:
  extends: .semver-tag-base
  resource_group: push-to-main
  before_script:
    - apk add --no-cache git openssh-client cosign
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      VERSION_FILE="vm/VERSION"

      if git diff --name-only HEAD~1 HEAD | grep -q "^${VERSION_FILE}"; then
        VERSION=$(tr -d ' \n' < ${VERSION_FILE})
        TAG="vm${VERSION}"
        SCRIPTS="crusoe_watch_agent.sh crusoe_watch_agent_amd.sh"

        git config user.name "gitlab-ci"
        git config user.email "gitlab-ci@crusoe.ai"

        # Create version tag
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists. Skipping tag creation."
        else
          git tag "$TAG"
          git push "https://ci-push-token:${REPO_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$TAG"
        fi

        # Prepare cosign key
        trap 'rm -f /tmp/cosign.key' EXIT
        echo "$COSIGN_PRIVATE_KEY_B64" | base64 -d > /tmp/cosign.key
        chmod 600 /tmp/cosign.key

        sign_script() {
          cosign sign-blob --yes --key /tmp/cosign.key \
            --output-signature "$1.sig" "$1"
          cosign verify-blob --key vm/cosign.pub \
            --signature "$1.sig" "$1"
        }

        # Sign source scripts (backward compat for raw GitHub downloads)
        for s in $SCRIPTS; do sign_script "vm/$s"; done

        # Publish to docs/vm/ (versioned + latest)
        for dir in docs/vm/v${VERSION} docs/vm/latest; do
          mkdir -p "$dir"
          for s in $SCRIPTS; do
            cp "vm/$s" "$dir/$s"
            sed -i "s/^AGENT_VERSION=.*/AGENT_VERSION=\"${TAG}\"/" "$dir/$s"
            sign_script "$dir/$s"
          done
          cp vm/VERSION "$dir/VERSION"
        done

        git add docs/vm vm/crusoe_watch_agent.sh.sig vm/crusoe_watch_agent_amd.sh.sig
        git commit -m "Publish VM agent ${TAG} to docs/vm [skip ci]"
        git remote set-url origin git@gitlab.com:${CI_PROJECT_PATH}.git
        git pull --rebase origin $CI_COMMIT_BRANCH
        git push origin HEAD:$CI_COMMIT_BRANCH
      else
        echo "VERSION file not changed. Skipping."
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "test/agent-version-pin"'
