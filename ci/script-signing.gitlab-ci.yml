script-signing:sign:
  stage: publish
  image: alpine:3.19
  # Requires protected CI/CD variables: COSIGN_PRIVATE_KEY_B64, COSIGN_PASSWORD, SSH_PRIVATE_KEY
  before_script:
    - apk add --no-cache cosign git openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@crusoe.ai"
  script:
    - |
      # Ensure private key is always cleaned up, even on failure
      trap 'rm -f /tmp/cosign.key' EXIT

      echo "$COSIGN_PRIVATE_KEY_B64" | base64 -d > /tmp/cosign.key
      chmod 600 /tmp/cosign.key

      for SCRIPT in vm/crusoe_watch_agent.sh vm/crusoe_watch_agent_amd.sh; do
        echo "Signing ${SCRIPT}..."
        cosign sign-blob \
          --yes \
          --key /tmp/cosign.key \
          --output-signature "${SCRIPT}.sig" \
          "${SCRIPT}"

        echo "Verifying signature for ${SCRIPT}..."
        cosign verify-blob \
          --key /tmp/cosign.key \
          --signature "${SCRIPT}.sig" \
          "${SCRIPT}"
        echo "Signature verified for ${SCRIPT}"
      done

      git add vm/crusoe_watch_agent.sh.sig vm/crusoe_watch_agent_amd.sh.sig
      git commit -m "Update script signatures [skip ci]"
      git remote set-url origin git@gitlab.com:${CI_PROJECT_PATH}.git
      git pull --rebase origin main
      git push origin HEAD:main
  artifacts:
    paths:
      - vm/crusoe_watch_agent.sh.sig
      - vm/crusoe_watch_agent_amd.sh.sig
    expire_in: never
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - vm/crusoe_watch_agent.sh
        - vm/crusoe_watch_agent_amd.sh
        - vm/VERSION
    - if: '$CI_COMMIT_TAG =~ /^vm-v/'