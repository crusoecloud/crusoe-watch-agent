script-signing:sign:
  stage: publish
  image: alpine:3.19
  # Requires protected CI/CD variables: COSIGN_PRIVATE_KEY_B64, COSIGN_PASSWORD
  before_script:
    - apk add --no-cache cosign
  script:
    - |
      # Ensure private key is always cleaned up, even on failure
      trap 'rm -f /tmp/cosign.key' EXIT

      echo "$COSIGN_PRIVATE_KEY_B64" | base64 -d > /tmp/cosign.key
      chmod 600 /tmp/cosign.key

      for SCRIPT in vm/crusoe_watch_agent.sh vm/crusoe_watch_agent_amd.sh; do
        echo "Signing ${SCRIPT}..."
        cosign sign-blob \
          --yes \
          --key /tmp/cosign.key \
          --output-signature "${SCRIPT}.sig" \
          "${SCRIPT}"

        echo "Verifying signature for ${SCRIPT}..."
        cosign verify-blob \
          --key /tmp/cosign.key \
          --signature "${SCRIPT}.sig" \
          "${SCRIPT}"
        echo "Signature verified for ${SCRIPT}"
      done
  artifacts:
    paths:
      - vm/crusoe_watch_agent.sh.sig
      - vm/crusoe_watch_agent_amd.sh.sig
    expire_in: never
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - vm/crusoe_watch_agent.sh
        - vm/crusoe_watch_agent_amd.sh
        - vm/VERSION
    - if: '$CI_COMMIT_TAG =~ /^vm-v/'
