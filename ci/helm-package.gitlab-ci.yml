helm:package:
  stage: publish
  resource_group: push-to-main
  image: alpine/helm:3.14.0
  before_script:
    - apk add --no-cache git openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@crusoe.ai"
  script:
    - mkdir -p docs/k8s/helm-charts
    - helm package ./k8s/helm-charts -d docs/k8s/helm-charts
    - helm repo index docs/k8s/helm-charts --url https://crusoecloud.github.io/crusoe-watch-agent/k8s/helm-charts
    - git add docs/k8s/helm-charts
    - git commit -m "Update helm repo [skip ci]"
    - git remote set-url origin git@gitlab.com:${CI_PROJECT_PATH}.git
    - git pull --rebase origin main
    - git push origin HEAD:main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - k8s/helm-charts/**
