log-collector:test:
  stage: test
  image: python:3.11-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r ./common/log-collector/app/requirements.txt
  script:
    - cd common/log-collector/app
    - python -m unittest test_log_collector -v
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - common/log-collector/**
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - common/log-collector/**
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'

log-collector:build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - job: log-collector:test
      optional: true
  parallel:
    matrix:
      - NAME: nvidia
        IMAGE: log-collector
        DOCKERFILE: Dockerfile.nvidia
        PLATFORMS: linux/amd64,linux/arm64
      - NAME: amd
        IMAGE: amd-log-collector
        DOCKERFILE: Dockerfile.amd
        PLATFORMS: linux/amd64
  before_script:
    - until docker info > /dev/null 2>&1; do sleep 1; done
    - echo "$GHCR_TOKEN" | docker login -u "$GHCR_USERNAME" --password-stdin ghcr.io
    - docker buildx create --use --name multiarch-${NAME} --driver docker-container
  script:
    - |
      IMAGE_FULL="ghcr.io/${GITHUB_MIRROR_REPO}/${IMAGE}"
      TAGS=""

      TAGS="${TAGS} --tag ${IMAGE_FULL}:${CI_COMMIT_SHORT_SHA}"

      if echo "$CI_COMMIT_TAG" | grep -qE '^v[0-9]'; then
        VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^v//')
        TAGS="${TAGS} --tag ${IMAGE_FULL}:${CI_COMMIT_TAG} --tag ${IMAGE_FULL}:${VERSION}"
      fi

      if [ "$CI_COMMIT_BRANCH" = "main" ] || echo "$CI_COMMIT_TAG" | grep -qE '^v[0-9]'; then
        TAGS="${TAGS} --tag ${IMAGE_FULL}:latest"
      fi

      docker buildx build \
        --platform ${PLATFORMS} \
        --push \
        ${TAGS} \
        -f ./common/log-collector/${DOCKERFILE} \
        ./common/log-collector
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - common/log-collector/**
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - common/log-collector/**
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
