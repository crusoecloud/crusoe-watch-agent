log-collector:test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r ./k8s/log-collector/requirements.txt
  script:
    - cd k8s/log-collector/app
    - python -m unittest test_log_collector_app -v
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - k8s/log-collector/**
        - vm/log-collector/**
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - k8s/log-collector/**
        - vm/log-collector/**
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
    - if: '$CI_COMMIT_TAG =~ /^vm-v/'

log-collector-k8s:build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - job: log-collector:test
      optional: true
  before_script:
    - until docker info > /dev/null 2>&1; do sleep 1; done
    - echo "$GHCR_TOKEN" | docker login -u "$GHCR_USERNAME" --password-stdin ghcr.io
    - docker buildx create --use --name multiarch --driver docker-container
  script:
    - |
      IMAGE="ghcr.io/${GITHUB_MIRROR_REPO}/log-collector"
      TAGS=""

      # Short SHA tag
      TAGS="${TAGS} --tag ${IMAGE}:${CI_COMMIT_SHORT_SHA}"

      # Tag with raw git tag and semver (strip v prefix)
      if echo "$CI_COMMIT_TAG" | grep -qE '^v[0-9]'; then
        VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^v//')
        TAGS="${TAGS} --tag ${IMAGE}:${CI_COMMIT_TAG} --tag ${IMAGE}:${VERSION} --tag ${IMAGE}:latest"
      fi

      # Latest on main
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="${TAGS} --tag ${IMAGE}:latest"
      fi

      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --push \
        ${TAGS} \
        -f ./k8s/log-collector/Dockerfile \
        ./k8s/log-collector
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - k8s/log-collector/**
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - k8s/log-collector/**
    - if: '$CI_COMMIT_TAG =~ /^vm-v/'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
      when: on_success

log-collector-vm:build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - job: log-collector:test
      optional: true
  before_script:
    - until docker info > /dev/null 2>&1; do sleep 1; done
    - echo "$GHCR_TOKEN" | docker login -u "$GHCR_USERNAME" --password-stdin ghcr.io
    - docker buildx create --use --name multiarch --driver docker-container
  script:
    - |
      IMAGE="ghcr.io/${GITHUB_MIRROR_REPO}/log-collector-vm"
      TAGS=""

      # Short SHA tag
      TAGS="${TAGS} --tag ${IMAGE}:${CI_COMMIT_SHORT_SHA}"

      # Tag with raw git tag and semver (strip vm-v prefix)
      if echo "$CI_COMMIT_TAG" | grep -qE '^vm-v'; then
        VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^vm-v//')
        TAGS="${TAGS} --tag ${IMAGE}:${CI_COMMIT_TAG} --tag ${IMAGE}:${VERSION} --tag ${IMAGE}:latest"
      fi

      # Latest on main
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="${TAGS} --tag ${IMAGE}:latest"
      fi

      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --push \
        ${TAGS} \
        -f ./vm/log-collector/Dockerfile \
        ./vm/log-collector
  rules:
    # Exclude non-vm tags
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - vm/log-collector/**
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - vm/log-collector/**
    - if: '$CI_COMMIT_TAG =~ /^vm-v/'
      when: on_success
