# VM agent release notes configuration

# Where to write the changelog
CHANGELOG_PATH="vm/CHANGELOG.md"

# One-line description for Claude prompt context
DESCRIPTION="Crusoe Watch Agent (VM installer — bash scripts that deploy monitoring via Docker or systemd)"

# File whose git history defines versions
# Leave VERSION_FIELD empty for plain version files (e.g. "1.0.6"),
# set for key-value files (e.g. "^version:" for Chart.yaml)
VERSION_FILE="vm/VERSION"
VERSION_FIELD=""

# Only include commits that touch these paths (space-separated)
SOURCE_PATHS="vm/ common/"

# Fetch MR/PR descriptions for richer context: "gitlab", "github", or "" (disabled)
MR_SOURCE="gitlab"

# Commit links point to the public GitHub mirror
COMMIT_URL_BASE="https://github.com/crusoecloud/crusoe-watch-agent/commit/"

# Pathspecs to exclude from diffs (space-separated, without :! prefix)
# Only used as fallback when MR descriptions are not available
DIFF_EXCLUDE="docs/ *.sig *.tgz **/index.yaml"

# Commit subject patterns to skip (grep -E, matched against "<sha> <subject>" lines)
COMMIT_SKIP="
Update helm repo
Update script signatures
Publish VM agent .* to docs/vm
"
