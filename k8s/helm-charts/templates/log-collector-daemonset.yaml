{{- /* Vendor-specific configuration for GPU log collectors */ -}}
{{- $vendorConfigs := dict
  "nvidia" (dict "tolerationKey" "nvidia.com/gpu" "affinityKey" "nvidia.com/gpu.present" "driverNamespace" "nvidia-gpu-operator" "driverPodPrefix" "nvidia-gpu-driver")
  "amd" (dict "tolerationKey" "amd.com/gpu" "affinityKey" "feature.node.kubernetes.io/amd-gpu" "driverNamespace" "kube-amd-gpu" "driverPodPrefix" "amd-gpu-driver")
}}

{{- range $vendor := list "nvidia" "amd" }}
{{- $vendorValues := index $.Values.logCollector $vendor }}
{{- $vcfg := index $vendorConfigs $vendor }}
{{- $shared := $.Values.logCollector }}
{{- if $vendorValues.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $vendorValues.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $vendorValues.name }}
    app.kubernetes.io/name: {{ $vendorValues.name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    gpu-vendor: {{ $vendor }}
spec:
  selector:
    matchLabels:
      app: {{ $vendorValues.name }}
  template:
    metadata:
      labels:
        app: {{ $vendorValues.name }}
        gpu-vendor: {{ $vendor }}
    spec:
      serviceAccountName: {{ $vendorValues.name }}

      {{- with ($vendorValues.nodeSelector | default $shared.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      tolerations:
        - key: {{ $vcfg.tolerationKey }}
          operator: Exists
          effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ $vcfg.affinityKey }}
                    operator: In
                    values:
                      - "true"

      initContainers:
        - name: fix-logs-permissions
          image: busybox:latest
          command: ["sh", "-c", "mkdir -p /logs && chown -R 0:0 /logs && chmod -R 755 /logs"]
          volumeMounts:
            - name: {{ $vendor }}-logs
              mountPath: /logs
          securityContext:
            runAsUser: 0

      containers:
      - name: log-collector
        image: "{{ $vendorValues.imageRepository }}:{{ $vendorValues.imageTag | default $shared.imageTag }}"
        imagePullPolicy: {{ $vendorValues.pullPolicy | default $shared.pullPolicy }}

        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CRUSOE_MONITORING_TOKEN
          valueFrom:
            secretKeyRef:
              name: crusoe-monitoring-token
              key: CRUSOE_MONITORING_TOKEN
        - name: GPU_TYPE
          value: {{ $vendor | quote }}
        - name: DRIVER_NAMESPACE
          value: {{ $vcfg.driverNamespace | quote }}
        - name: DRIVER_POD_PREFIX
          value: {{ $vcfg.driverPodPrefix | quote }}
        {{- range $key, $value := ($vendorValues.env | default $shared.env) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}

        envFrom:
        - secretRef:
            name: crusoe-secrets
            optional: false

        volumeMounts:
        - name: {{ $vendor }}-logs
          mountPath: /logs
        - name: sysfs
          mountPath: /host/sys
          readOnly: true

        {{- with ($vendorValues.resources | default $shared.resources) }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}

        {{- with ($vendorValues.securityContext | default $shared.securityContext) }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}

      volumes:
      - name: {{ $vendor }}-logs
        hostPath:
          path: /var/log/{{ $vendor }}-bug-reports
          type: DirectoryOrCreate
      - name: sysfs
        hostPath:
          path: /sys
{{- end }}
{{- end }}
