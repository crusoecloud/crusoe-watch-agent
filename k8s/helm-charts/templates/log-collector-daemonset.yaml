{{- if .Values.logCollector.enabled }}
{{- /* Auto-detect GPU type by checking for GPU Operator namespaces */ -}}
{{- $detectedGpuType := "" }}
{{- if not .Values.logCollector.gpuType }}
  {{- $nvidiaNamespace := lookup "v1" "Namespace" "" "nvidia-gpu-operator" }}
  {{- $amdNamespace := lookup "v1" "Namespace" "" "amd-gpu-operator" }}
  {{- $kubeAmdNamespace := lookup "v1" "Namespace" "" "kube-amd-gpu" }}
  {{- if $nvidiaNamespace }}
    {{- $detectedGpuType = "nvidia" }}
  {{- else if or $amdNamespace $kubeAmdNamespace }}
    {{- $detectedGpuType = "amd" }}
  {{- else }}
    {{- $detectedGpuType = "nvidia" }}
  {{- end }}
{{- end }}
{{- $gpuType := .Values.logCollector.gpuType | default $detectedGpuType }}
{{- $gpuVendor := printf "%s.com/gpu" $gpuType }}
{{- $volumeName := printf "%s-logs" $gpuType }}
{{- $logPath := printf "/var/log/%s-bug-reports" $gpuType }}
{{- /* Select appropriate image based on GPU type */ -}}
{{- $imageRepo := .Values.logCollector.image.repository }}
{{- if eq $gpuType "amd" }}
  {{- if not (contains "amd" $imageRepo) }}
    {{- $imageRepo = "ghcr.io/crusoecloud/crusoe-watch-agent/amd-log-collector" }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.logCollector.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.logCollector.name }}
    app.kubernetes.io/name: {{ .Values.logCollector.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.logCollector.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.logCollector.name }}
    spec:
      serviceAccountName: {{ .Values.logCollector.name }}

      {{- if .Values.logCollector.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.logCollector.nodeSelector | nindent 8 }}
      {{- end }}

      tolerations:
        - key: {{ $gpuVendor }}
          operator: Exists
          effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              {{- if eq $gpuType "amd" }}
              - matchExpressions:
                  - key: feature.node.kubernetes.io/amd-gpu
                    operator: In
                    values:
                      - "true"
              {{- else }}
              - matchExpressions:
                  - key: {{ $gpuVendor }}.present
                    operator: In
                    values:
                      - "true"
              {{- end }}

      initContainers:
        - name: fix-logs-permissions
          image: busybox:latest
          command: ["sh", "-c", "mkdir -p /logs && chown -R 0:0 /logs && chmod -R 755 /logs"]
          volumeMounts:
            - name: {{ $volumeName }}
              mountPath: /logs
          securityContext:
            runAsUser: 0

      containers:
      - name: log-collector
        image: "{{ $imageRepo }}:{{ .Values.logCollector.image.tag }}"
        imagePullPolicy: {{ .Values.logCollector.image.pullPolicy }}

        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CRUSOE_MONITORING_TOKEN
          valueFrom:
            secretKeyRef:
              name: crusoe-monitoring-token
              key: CRUSOE_MONITORING_TOKEN
        - name: GPU_TYPE
          value: {{ $gpuType | quote }}
        - name: DRIVER_NAMESPACE
          value: {{ printf "%s-gpu-operator" $gpuType | quote }}
        - name: DRIVER_POD_PREFIX
          value: {{ printf "%s-gpu-driver" $gpuType | quote }}
        {{- range $key, $value := .Values.logCollector.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}

        envFrom:
        - secretRef:
            name: crusoe-secrets
            optional: false

        volumeMounts:
        - name: {{ $volumeName }}
          mountPath: /logs
        - name: sysfs
          mountPath: /host/sys
          readOnly: true

        {{- if .Values.logCollector.resources }}
        resources:
          {{- toYaml .Values.logCollector.resources | nindent 10 }}
        {{- end }}

        {{- if .Values.logCollector.securityContext }}
        securityContext:
          {{- toYaml .Values.logCollector.securityContext | nindent 10 }}
        {{- end }}

      volumes:
      - name: {{ $volumeName }}
        hostPath:
          path: {{ $logPath }}
          type: DirectoryOrCreate
      - name: sysfs
        hostPath:
          path: /sys
{{- end }}