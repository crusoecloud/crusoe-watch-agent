{{- /* Vendor-specific configuration for GPU log collectors */ -}}
{{- $vendorConfigs := dict
  "nvidia" (dict "affinityKey" "nvidia.com/gpu.present" "driverNamespace" "nvidia-gpu-operator" "driverPodPrefix" "nvidia-gpu-driver")
  "amd" (dict "affinityKey" "feature.node.kubernetes.io/amd-gpu" "driverNamespace" "kube-amd-gpu" "driverPodPrefix" "amd-gpu-driver")
}}

{{- range $vendor := list "nvidia" "amd" }}
{{- $vendorValues := index $.Values.logCollector $vendor }}
{{- $vcfg := index $vendorConfigs $vendor }}
{{- $shared := $.Values.logCollector }}
{{- if $vendorValues.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $vendorValues.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $vendorValues.name }}
    app.kubernetes.io/name: {{ $vendorValues.name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    gpu-vendor: {{ $vendor }}
spec:
  selector:
    matchLabels:
      app: {{ $vendorValues.name }}
  template:
    metadata:
      labels:
        app: {{ $vendorValues.name }}
        gpu-vendor: {{ $vendor }}
    spec:
      serviceAccountName: {{ $vendorValues.name }}

      {{- with ($vendorValues.nodeSelector | default $shared.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with ($vendorValues.tolerations | default $shared.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ $vcfg.affinityKey }}
                    operator: In
                    values:
                      - "true"

      containers:
      - name: log-collector
        image: "{{ $vendorValues.imageRepository }}:{{ $vendorValues.imageTag | default $shared.imageTag }}"
        imagePullPolicy: {{ $vendorValues.pullPolicy | default $shared.pullPolicy }}

        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CRUSOE_MONITORING_TOKEN
          valueFrom:
            secretKeyRef:
              name: crusoe-monitoring-token
              key: CRUSOE_MONITORING_TOKEN
        - name: GPU_TYPE
          value: {{ $vendor | quote }}
        - name: DRIVER_NAMESPACE
          value: {{ $vcfg.driverNamespace | quote }}
        - name: DRIVER_POD_PREFIX
          value: {{ $vcfg.driverPodPrefix | quote }}
        {{- range $key, $value := ($vendorValues.env | default $shared.env) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if $.Values.proxy.enabled }}
        - name: PROXY_ENABLED
          value: "true"
        - name: PROXY_URL
          value: {{ $.Values.proxy.url | quote }}
        - name: PROXY_PORT
          value: {{ $.Values.proxy.port | quote }}
        {{- end }}

        envFrom:
        - secretRef:
            name: crusoe-secrets
            optional: false

        volumeMounts:
        - name: {{ $vendor }}-logs
          mountPath: /logs
        - name: sysfs
          mountPath: /host/sys
          readOnly: true

        {{- with ($vendorValues.resources | default $shared.resources) }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}

        {{- with ($vendorValues.securityContext | default $shared.securityContext) }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}

      volumes:
      - name: {{ $vendor }}-logs
        hostPath:
          path: /var/log/{{ $vendor }}-bug-reports
          type: DirectoryOrCreate
      - name: sysfs
        hostPath:
          path: /sys
{{- end }}
{{- end }}
