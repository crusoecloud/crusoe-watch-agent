{{- if .Values.crusoeMetricsExporter.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.crusoeMetricsExporter.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.crusoeMetricsExporter.name }}
    app.kubernetes.io/name: {{ .Values.crusoeMetricsExporter.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.crusoeMetricsExporter.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.crusoeMetricsExporter.name }}
        app.kubernetes.io/name: {{ .Values.crusoeMetricsExporter.name }}
    spec:
      hostPID: true
      serviceAccountName: {{ .Values.crusoeMetricsExporter.name }}

      {{- if .Values.crusoeMetricsExporter.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.crusoeMetricsExporter.nodeSelector | nindent 8 }}
      {{- end }}

      {{- if .Values.crusoeMetricsExporter.tolerations }}
      tolerations:
        {{- toYaml .Values.crusoeMetricsExporter.tolerations | nindent 8 }}
      {{- end }}

      {{- if .Values.crusoeMetricsExporter.affinity }}
      affinity:
        {{- toYaml .Values.crusoeMetricsExporter.affinity | nindent 8 }}
      {{- end }}

      containers:
      - name: crusoe-metrics-exporter
        image: "{{ .Values.crusoeMetricsExporter.image.repository }}:{{ .Values.crusoeMetricsExporter.image.tag }}"
        imagePullPolicy: {{ .Values.crusoeMetricsExporter.image.pullPolicy }}

        ports:
        - name: metrics
          containerPort: {{ .Values.crusoeMetricsExporter.port }}
          protocol: TCP

        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CRUSOE_MONITORING_TOKEN
          valueFrom:
            secretKeyRef:
              name: crusoe-monitoring-token
              key: CRUSOE_MONITORING_TOKEN
        {{- range $key, $value := .Values.crusoeMetricsExporter.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}

        envFrom:
        - secretRef:
            name: crusoe-secrets
            optional: false

        livenessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        volumeMounts:
        {{- if .Values.crusoeMetricsExporter.volumeMounts }}
          {{- toYaml .Values.crusoeMetricsExporter.volumeMounts | nindent 8 }}
        {{- end }}

        {{- if .Values.crusoeMetricsExporter.resources }}
        resources:
          {{- toYaml .Values.crusoeMetricsExporter.resources | nindent 10 }}
        {{- end }}

        {{- if .Values.crusoeMetricsExporter.securityContext }}
        securityContext:
          {{- toYaml .Values.crusoeMetricsExporter.securityContext | nindent 10 }}
        {{- end }}

      volumes:
      {{- if .Values.crusoeMetricsExporter.volumes }}
        {{- toYaml .Values.crusoeMetricsExporter.volumes | nindent 6 }}
      {{- end }}
{{- end }}
