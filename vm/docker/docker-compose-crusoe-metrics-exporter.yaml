services:
  crusoe-metrics-exporter:
    image: ghcr.io/crusoecloud/crusoe-metrics-exporter/crusoe-metrics-exporter:0.1.1
    container_name: crusoe-metrics-exporter
    pid: "host"
    hostname: crusoe-metrics-exporter

    volumes:
      # Host proc filesystem for disk/mount stats
      - /proc:/host/proc:ro
      # DMI information for VM ID detection
      - /sys:/host/sys:ro

    env_file:
      - ./.env
      - /etc/crusoe/secrets/.monitoring-token

    environment:
      - PORT=9500
      - DISKSTATS_PATH=/proc/diskstats
      - MOUNTSTATS_PATH=/proc/self/mountstats
      # OBJSTORE_ENDPOINT_FQDN is sourced from .env (set by the install script's --region flag)
      - OBJSTORE_ENDPOINT_FQDN=${OBJSTORE_ENDPOINT_FQDN:-}

    ports:
      - "${CRUSOE_METRICS_EXPORTER_PORT:-9500}:9500"

    privileged: true
    restart: always
