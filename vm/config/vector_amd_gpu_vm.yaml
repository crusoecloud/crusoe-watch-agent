# Configure Vector data directory for disk buffers
data_dir: /var/lib/vector

# Shared configuration templates
x-common-buffer-config: &common-buffer-config
    type: disk
    max_size: 268435488  # 256 MiB
    when_full: block

sources:
    host_metrics:
        type: host_metrics
        collectors:
            - cpu
            - disk
            - host
            - memory
            - network
            - process
        network:
          devices:
            excludes:
              - "lo*"
            includes:
              - "ens*"
        scrape_interval_secs: 60

    amd_metrics:
        type: prometheus_scrape
        endpoints:
            - http://localhost:${AMD_EXPORTER_PORT}/metrics
        scrape_interval_secs: 60
        scrape_timeout_secs: 50

    internal_metrics:
      type: internal_metrics
      scrape_interval_secs: 60

    journald_logs:
        type: journald
        journal_directory: /var/log/journal
        since_now: true
        # The agent itself runs vector via docker-compose under
        # crusoe-watch-agent.service, and docker-compose forwards the
        # container's stdout to journald. Without excluding it here, every
        # vector internal log is ingested twice (once via internal_logs,
        # once via journald-with-mangled-logfmt).
        exclude_units:
            - crusoe-watch-agent.service
            - crusoe-watch-agent-native.service

    vector_internal_logs:
        type: internal_logs


transforms:
    enrich_logs:
        type: remap
        inputs:
            - parse_journald_logs
            - parse_internal_logs
        source: |
            .agent = "crusoe-watch-agent"
            .agent_version = "${AGENT_VERSION}"
            .host = get_hostname!()

            del(.source_type)

            # Fallback _time if not set
            if !exists(._time) {
                if exists(.__REALTIME_TIMESTAMP) {
                    ._time = .__REALTIME_TIMESTAMP
                } else if exists(.timestamp) {
                    ._time = .timestamp
                }
            }

            # Fallback _msg if not set
            if !exists(._msg) && exists(.message) {
                ._msg = del(.message)
            }

            # Normalize level to canonical enum (mirrors GCP Cloud Logging SEVERITY_TRANSLATIONS):
            #   emergency, alert, critical, error, warning, notice, info, debug
            # Unrecognized values are dropped; missing levels stay absent.
            level_synonyms = {
                "emergency": "emergency", "emerg": "emergency",
                "alert": "alert", "a": "alert",
                "critical": "critical", "crit": "critical", "fatal": "critical", "c": "critical", "f": "critical",
                "error": "error", "err": "error", "severe": "error", "e": "error",
                "warning": "warning", "warn": "warning", "w": "warning",
                "notice": "notice", "n": "notice",
                "info": "info", "information": "info", "i": "info",
                "debug": "debug", "trace": "debug", "trace_int": "debug",
                "fine": "debug", "finer": "debug", "finest": "debug", "config": "debug", "d": "debug"
            }
            if exists(.level) {
                lvl = downcase(string!(.level))
                normalized = get(level_synonyms, [lvl]) ?? null
                if normalized != null {
                    .level = normalized
                } else {
                    del(.level)
                }
            }

    parse_journald_logs:
        type: remap
        inputs:
            - journald_logs
        source: |
            .log_source = "journald"

            # Map syslog PRIORITY to a canonical level. enrich_logs runs the final
            # normalize-or-drop pass against the level_synonyms map.
            # Coerce defensively: journald emits PRIORITY as a string, but other
            # upstreams (e.g. forwarded syslog) may not.
            priority = to_string(.PRIORITY) ?? ""
            if priority == "0" {
                .level = "emergency"
            } else if priority == "1" {
                .level = "alert"
            } else if priority == "2" {
                .level = "critical"
            } else if priority == "3" {
                .level = "error"
            } else if priority == "4" {
                .level = "warning"
            } else if priority == "5" {
                .level = "notice"
            } else if priority == "6" {
                .level = "info"
            } else if priority == "7" {
                .level = "debug"
            }

            # Infallible bind — events without MESSAGE would otherwise abort the transform.
            msg = string(.message) ?? ""

            # Default: preserve MESSAGE verbatim. The whitelist below may override
            # _msg / level / _time if it extracts cleaner values from real logfmt.
            ._msg = msg

            # Narrow logfmt whitelist. parse_logfmt is intentionally permissive
            # (see vector#6418), so we only run it on identifiers known to emit
            # real logfmt-shaped MESSAGE, gate on a `^\S+=` sniff, and validate
            # extracted keys are proper identifiers. Everything else (sshd, sudo,
            # systemd, kernel, etc.) keeps its raw _msg and natively-promoted
            # journald fields; consumers can use LogsQL's unpack_logfmt at query
            # time for fields we don't materialize at ingest.
            logfmt_emitters = ["containerd", "dockerd", "etcd"]
            syslog_id = string(.SYSLOG_IDENTIFIER) ?? ""

            if includes(logfmt_emitters, syslog_id) && match(msg, r'^\S+=') {
                parsed, err = parse_logfmt(msg)
                if err == null && is_object(parsed) {
                    structured_fields = {}
                    for_each(object(parsed)) -> |key, value| {
                        # Skip bare tokens (no `=`) and mangled keys (non-identifier shape).
                        is_bare = (value == true) || (value == "true")
                        if !is_bare && match(key, r'^[a-zA-Z_][a-zA-Z0-9_.-]*$') {
                            structured_fields = set!(structured_fields, [key], value)
                        }
                    }

                    if length(structured_fields) > 0 {
                        if exists(structured_fields.msg) {
                            ._msg = string!(structured_fields.msg)
                        }
                        if exists(structured_fields.time) {
                            parsed_time, ts_err = parse_timestamp(string!(structured_fields.time), format: "%+")
                            if ts_err == null {
                                ._time = parsed_time
                            }
                        }
                        if exists(structured_fields.level) {
                            .level = downcase(string!(structured_fields.level))
                        }
                        for_each(structured_fields) -> |key, value| {
                            if key != "msg" && key != "time" && key != "level" {
                                . = set!(., [key], value)
                            }
                        }
                    }
                }
            }

            del(.message)
            del(.timestamp)

    parse_internal_logs:
        type: remap
        inputs:
            - vector_internal_logs
        source: |
            .log_source = "crusoe-watch-agent"
            if exists(.metadata.level) {
                .level = downcase(string!(.metadata.level))
            }

    add_update_labels:
        type: remap
        inputs:
            - host_metrics
            - amd_metrics
        source: |
            del(.tags.Hostname)
            .tags.vm_id = "${VM_ID}"
            .tags.crusoe_resource = "vm"

    filter_internal_metrics:
        type: filter
        inputs:
            - internal_metrics
        condition: |
            includes(
                [
                  "buffer_byte_size",
                  "buffer_discarded_events_total",
                  "buffer_events",
                  "buffer_received_events_total",
                  "buffer_sent_events_total",
                  "build_info",
                  "component_discarded_events_total",
                  "component_errors_total",
                  "component_received_events_total",
                  "component_sent_events_total",
                  "config_reloaded",
                  "connection_established_total",
                  "connection_send_errors_total",
                  "http_client_requests_sent_total",
                  "http_client_responses_total",
                  "internal_metrics_cardinality",
                  "open_connections",
                  "open_files",
                  "uptime_seconds",
              ],
                .name,
            )

    add_internal_labels:
        type: remap
        inputs:
          - filter_internal_metrics
        source: |
          .tags.vm_id = "${VM_ID}"
          .tags.crusoe_resource = "vm"
          .tags.agent_version = "${AGENT_VERSION}"

sinks:
    crusoe_ingest:
        type: http
        inputs:
            - enrich_logs
        uri: "${LOGS_INGRESS_ENDPOINT}"
        framing:
            method: newline_delimited
        compression: snappy
        healthcheck:
            enabled: false
        request:
            headers:
                X-Crusoe-Vm-Id: "${VM_ID}"
        auth:
            strategy: bearer
            token: "${CRUSOE_AUTH_TOKEN}"
        encoding:
            codec: json
        batch:
            max_bytes: 100000
        tls:
            verify_certificate: true
            verify_hostname: true
            alpn_protocols: ["h2", "http/1.1"]

    cms_gateway:
        type: prometheus_remote_write
        inputs:
            - add_update_labels
            - add_internal_labels
        endpoint: "${TELEMETRY_INGRESS_ENDPOINT}"
        tenant_id: "cri:vm/${VM_ID}"
        auth:
            strategy: bearer
            token: "${CRUSOE_AUTH_TOKEN}"
        healthcheck:
            enabled: false
        request:
          concurrency: adaptive
        batch:
          max_bytes: 500000 # ~500KB
          aggregate: false
        compression: snappy
        tls:
            verify_certificate: true
            verify_hostname: true
            alpn_protocols: ["h2", "http/1.1"]
        buffer: *common-buffer-config
