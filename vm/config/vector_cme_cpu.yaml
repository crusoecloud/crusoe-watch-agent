sources:
    host_metrics:
        type: host_metrics
        collectors:
            - cpu
            - disk
            - host
            - memory
            - network
            - process
        network:
          devices:
            excludes:
              - "lo*"
            includes:
              - "ens*"
        process:
          processes:
            includes:
              - "vector"
        scrape_interval_secs: 60

    crusoe_infra_metrics:
        type: prometheus_scrape
        endpoints:
            - http://localhost:9500/metrics
        scrape_interval_secs: 60
        scrape_timeout_secs: 50

    internal_metrics:
        type: internal_metrics
        scrape_interval_secs: 60

    journald_logs:
        type: journald
        journal_directory: /var/log/journal
        since_now: true
        # The agent itself runs vector via docker-compose under
        # crusoe-watch-agent.service, and docker-compose forwards the
        # container's stdout to journald. Without excluding it here, every
        # vector internal log is ingested twice (once via internal_logs,
        # once via journald-with-mangled-logfmt).
        exclude_units:
            - crusoe-watch-agent.service
            - crusoe-watch-agent-native.service

    vector_internal_logs:
        type: internal_logs


transforms:
    enrich_logs:
        type: remap
        inputs:
            - parse_journald_logs
            - parse_internal_logs
        source: |
            # enrich_logs converges all parser branches and assembles the standardized
            # envelope: the raw event verbatim under `payload`, Crusoe identity under
            # `crusoe`, and _msg/_time/level/log_source at the top level.

            # Pull the agent-derived scratch fields off the event before wrapping; what
            # remains is the raw log, preserved verbatim under payload.
            parsed_msg = null
            if exists(._msg) {
                parsed_msg = del(._msg)
            }
            parsed_time = null
            if exists(._time) {
                parsed_time = del(._time)
            }

            cwa_level = null
            if exists(.level) {
                cwa_level = del(.level)
            }
            cwa_log_source = null
            if exists(.log_source) {
                cwa_log_source = del(.log_source)
            }

            raw = .
            . = {}
            .payload = raw

            # Crusoe identity metadata; remaining identity fields are set by CML Ingress.
            .crusoe = { "agent": "crusoe-watch-agent", "agent_version": "${AGENT_VERSION}" }
            if cwa_log_source != null {
                .log_source = cwa_log_source
            }

            if parsed_msg != null {
                ._msg = parsed_msg
            } else if exists(.payload.message) {
                ._msg = .payload.message
            }

            if parsed_time != null {
                ._time = parsed_time
            } else if exists(.payload.__REALTIME_TIMESTAMP) {
                ._time = .payload.__REALTIME_TIMESTAMP
            } else if exists(.payload.timestamp) {
                ._time = .payload.timestamp
            }

            # Normalize level to canonical enum (mirrors GCP Cloud Logging SEVERITY_TRANSLATIONS).
            # Unrecognized values are omitted.
            level_synonyms = {
                "emergency": "emergency", "emerg": "emergency",
                "alert": "alert", "a": "alert",
                "critical": "critical", "crit": "critical", "fatal": "critical", "c": "critical", "f": "critical",
                "error": "error", "err": "error", "severe": "error", "e": "error",
                "warning": "warning", "warn": "warning", "w": "warning",
                "notice": "notice", "n": "notice",
                "info": "info", "information": "info", "i": "info",
                "debug": "debug", "trace": "debug", "trace_int": "debug",
                "fine": "debug", "finer": "debug", "finest": "debug", "config": "debug", "d": "debug"
            }
            if cwa_level != null {
                lvl = downcase(string!(cwa_level))
                normalized = get(level_synonyms, [lvl]) ?? null
                if normalized != null {
                    .level = normalized
                }
            }

    parse_journald_logs:
        type: remap
        inputs:
            - journald_logs
        source: |
            .log_source = "journald"

            # Map syslog PRIORITY to a canonical level, staged in scratch .level
            # (enrich_logs normalizes it to the top-level `level`). The raw event keeps
            # PRIORITY untouched. Coerce defensively: journald emits PRIORITY as a string.
            priority = to_string(.PRIORITY) ?? ""
            if priority == "0" {
                .level = "emergency"
            } else if priority == "1" {
                .level = "alert"
            } else if priority == "2" {
                .level = "critical"
            } else if priority == "3" {
                .level = "error"
            } else if priority == "4" {
                .level = "warning"
            } else if priority == "5" {
                .level = "notice"
            } else if priority == "6" {
                .level = "info"
            } else if priority == "7" {
                .level = "debug"
            }

            # Infallible bind — events without MESSAGE would otherwise abort the transform.
            msg = string(.message) ?? ""

            ._msg = msg

            # Narrow logfmt whitelist. parse_logfmt is intentionally permissive
            # (see vector#6418), so we only run it on identifiers known to emit
            # real logfmt-shaped MESSAGE and gate on a `^\S+=` sniff. We extract ONLY
            # msg/level/time into scratch — other structured fields are not materialized
            # onto the event, so payload stays raw (full MESSAGE preserved at
            # payload.message; use unpack_logfmt at query time if needed).
            logfmt_emitters = ["containerd", "dockerd", "etcd"]
            syslog_id = string(.SYSLOG_IDENTIFIER) ?? ""

            if includes(logfmt_emitters, syslog_id) && match(msg, r'^\S+=') {
                parsed, err = parse_logfmt(msg)
                if err == null && is_object(parsed) {
                    structured_fields = object(parsed)
                    if exists(structured_fields.msg) {
                        ._msg = string!(structured_fields.msg)
                    }
                    if exists(structured_fields.time) {
                        parsed_time, ts_err = parse_timestamp(string!(structured_fields.time), format: "%+")
                        if ts_err == null {
                            ._time = parsed_time
                        }
                    }
                    if exists(structured_fields.level) {
                        .level = downcase(string!(structured_fields.level))
                    }
                }
            }

            # NOTE: nothing is deleted here. enrich_logs wraps the full scraped event
            # (including raw .message and .timestamp) under payload; ._msg / ._time set
            # above are the parsed values that enrich_logs lifts to the top level.

    parse_internal_logs:
        type: remap
        inputs:
            - vector_internal_logs
        source: |
            .log_source = "crusoe-watch-agent"
            if exists(.metadata.level) {
                .level = downcase(string!(.metadata.level))
            }

    add_update_labels:
        type: remap
        inputs:
            - host_metrics
        source: |
            del(.tags.Hostname)
            .tags.vm_id = "${VM_ID}"
            .tags.crusoe_resource = "vm"

    enrich_crusoe_infra_metrics:
        type: remap
        inputs:
            - crusoe_infra_metrics
        source: |
            .tags.vm_id = "${VM_ID}"
            .tags.crusoe_resource = "vm_custom_infra"
            .tags.agent_version = "${AGENT_VERSION}"

    filter_internal_metrics:
        type: filter
        inputs:
            - internal_metrics
        condition: |
            includes(
                [
                  "buffer_byte_size",
                  "buffer_discarded_events_total",
                  "buffer_events",
                  "buffer_received_events_total",
                  "buffer_sent_events_total",
                  "build_info",
                  "component_discarded_events_total",
                  "component_errors_total",
                  "component_received_events_total",
                  "component_sent_events_total",
                  "config_reloaded",
                  "connection_established_total",
                  "connection_send_errors_total",
                  "http_client_requests_sent_total",
                  "http_client_responses_total",
                  "internal_metrics_cardinality",
                  "open_connections",
                  "open_files",
                  "uptime_seconds",
              ],
                .name,
            )

    add_internal_labels:
        type: remap
        inputs:
            - filter_internal_metrics
        source: |
            .tags.vm_id = "${VM_ID}"
            .tags.crusoe_resource = "vm"
            .tags.agent_version = "${AGENT_VERSION}"

sinks:
    crusoe_ingest:
        type: http
        inputs:
            - enrich_logs
        uri: "${LOGS_INGRESS_ENDPOINT}"
        framing:
            method: newline_delimited
        compression: snappy
        healthcheck:
            enabled: false
        request:
            headers:
                X-Crusoe-Vm-Id: "${VM_ID}"
                User-Agent: "CrusoeWatchAgent/VM-${AGENT_VERSION}"
        auth:
            strategy: bearer
            token: "${CRUSOE_AUTH_TOKEN}"
        encoding:
            codec: json
        batch:
            max_bytes: 100000
        tls:
            verify_certificate: true
            verify_hostname: true
            alpn_protocols: ["h2", "http/1.1"]

    cms_gateway:
        type: prometheus_remote_write
        inputs:
            - add_update_labels
            - add_internal_labels
        endpoint: "${TELEMETRY_INGRESS_ENDPOINT}"
        tenant_id: "cri:vm/${VM_ID}"
        auth:
            strategy: bearer
            token: "${CRUSOE_AUTH_TOKEN}"
        healthcheck:
            enabled: false
        request:
          concurrency: adaptive
        batch:
          max_bytes: 500000 # ~500KB
          aggregate: false
        compression: snappy
        tls:
            verify_certificate: true
            verify_hostname: true
            alpn_protocols: ["h2", "http/1.1"]

    cms_gateway_cme:
        type: prometheus_remote_write
        inputs:
            - enrich_crusoe_infra_metrics
        endpoint: "${TELEMETRY_INGRESS_ENDPOINT}"
        tenant_id: "cri:vm/${VM_ID}"
        auth:
            strategy: bearer
            token: "${CRUSOE_AUTH_TOKEN}"
        healthcheck:
            enabled: false
        request:
            concurrency: adaptive
        batch:
            max_bytes: 500000 # ~500KB
            aggregate: false
        compression: snappy
        tls:
            verify_certificate: true
            verify_hostname: true
            alpn_protocols: ["h2", "http/1.1"]
